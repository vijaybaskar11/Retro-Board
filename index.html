<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Retro Board — enlight360containers</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f5f7; --surface: #ffffff; --surface2: #f8f9fa; --border: rgba(0,0,0,0.1);
    --text: #1a1a2e; --text2: #5a6272; --text3: #9aa0ab;
    --accent: #FC6D26; --radius: 10px; --radius-sm: 7px;
    --success-bg: #e6f9f0; --success-text: #0a6640;
    --warn-bg: #fff8e6; --warn-text: #7a4f00;
    --info-bg: #e8f0fe; --info-text: #1a56a4;
    --danger-text: #c0392b;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  input, textarea, select {
    font-family: inherit; font-size: 13px; color: var(--text);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 7px 10px; outline: none; width: 100%;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(252,109,38,0.12); }
  button {
    font-family: inherit; font-size: 13px; cursor: pointer; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    padding: 7px 14px; transition: background 0.15s, border-color 0.15s;
  }
  button:hover { background: var(--surface2); border-color: rgba(0,0,0,0.2); }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  a { color: var(--info-text); }
  code { font-size: 12px; padding: 1px 5px; background: var(--surface2); border-radius: 4px; border: 1px solid var(--border); }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const GITLAB_URL = "https://git.enlight.dev";
const GITLAB_GROUP = "enlight360containers";

const COLUMNS = [
  { id: "went_well",   title: "What Went Well",          icon: "ti-circle-check",  color: "#1D9E75", bg: "#e6f9f0", tc: "#0a5a38" },
  { id: "improve",     title: "What Could Be Improved",  icon: "ti-alert-triangle", color: "#D85A30", bg: "#fff0ea", tc: "#7a2a10" },
  { id: "suggestions", title: "Suggestions / Ideas",     icon: "ti-bulb",           color: "#185FA5", bg: "#e8f0fe", tc: "#0d3a78" },
  { id: "actions",     title: "Action Items",            icon: "ti-checkbox",       color: "#BA7517", bg: "#fff8e6", tc: "#6b3c00" },
  { id: "shoutouts",   title: "Shoutouts",               icon: "ti-heart",          color: "#993556", bg: "#fceef4", tc: "#5c1a34" },
];

const uid = () => Math.random().toString(36).substr(2, 9);

function GitLabLogo({ size = 16 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" style={{flexShrink:0}}>
      <path d="M22.65 14.39L12 22.13 1.35 14.39a.84.84 0 01-.3-.94l1.22-3.78 2.44-7.51A.42.42 0 014.82 2a.43.43 0 01.58 0 .42.42 0 01.11.18l2.44 7.49h8.1l2.44-7.51A.42.42 0 0118.6 2a.43.43 0 01.58 0 .42.42 0 01.11.18l2.44 7.51L22.95 13.45a.84.84 0 01-.3.94z" fill="#FC6D26"/>
    </svg>
  );
}

function Badge({ children, bg, color }) {
  return <span style={{fontSize:11,padding:'2px 8px',borderRadius:20,background:bg,color,fontWeight:500,whiteSpace:'nowrap'}}>{children}</span>;
}

function Notification({ msg, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3000); return () => clearTimeout(t); }, []);
  const isErr = type === 'error';
  return (
    <div style={{position:'fixed',top:20,right:20,zIndex:9999,padding:'10px 18px',borderRadius:10,
      background: isErr ? '#fdecea' : '#e6f9f0',
      color: isErr ? '#c0392b' : '#0a6640',
      border: `1px solid ${isErr ? '#f5c6c6' : '#b2dfcf'}`,
      boxShadow:'0 4px 20px rgba(0,0,0,0.12)',fontSize:14,fontWeight:500,display:'flex',alignItems:'center',gap:8}}>
      <i className={`ti ${isErr ? 'ti-alert-circle' : 'ti-circle-check'}`} />
      {msg}
    </div>
  );
}

function TokenModal({ token, setToken, onFetch, onSave, onClose, error, loading, projects, selProject, setSelProject }) {
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{background:'#fff',borderRadius:14,padding:'1.5rem',width:'100%',maxWidth:460,boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}><GitLabLogo size={20}/><span style={{fontSize:15,fontWeight:600}}>GitLab configuration</span></div>
          <button onClick={onClose} style={{border:'none',background:'transparent',fontSize:20,cursor:'pointer',color:'#999',padding:4}} aria-label="Close"><i className="ti ti-x"/></button>
        </div>
        <div style={{fontSize:13,color:'#666',marginBottom:14,padding:'8px 12px',background:'#f8f9fa',borderRadius:8}}>
          <div>Instance: <strong>git.enlight.dev</strong></div>
          <div>Group: <strong>enlight360containers</strong></div>
        </div>
        <p style={{fontSize:13,color:'#666',marginBottom:12}}>
          Go to <a href="https://git.enlight.dev/-/profile/personal_access_tokens" target="_blank" rel="noopener">Profile → Access Tokens</a> and create a token with <code>api</code> scope.
        </p>
        <label style={{fontSize:13,color:'#444',display:'block',marginBottom:5}}>Personal access token</label>
        <input type="password" value={token} onChange={e=>setToken(e.target.value)} placeholder="glpat-xxxxxxxxxxxxxxxxxxxx" style={{marginBottom:10}} />
        {error && <p style={{fontSize:13,color:'#c0392b',marginBottom:8}}><i className="ti ti-alert-circle"/> {error}</p>}
        <button onClick={onFetch} disabled={loading||!token} style={{marginBottom:12}}>
          <i className="ti ti-refresh" style={{marginRight:5}}/>{loading ? 'Loading projects...' : 'Load projects'}
        </button>
        {projects.length > 0 && (
          <div style={{marginBottom:14}}>
            <label style={{fontSize:13,color:'#444',display:'block',marginBottom:5}}>Select project for issue tracking</label>
            <select value={selProject} onChange={e=>setSelProject(e.target.value)}>
              {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </div>
        )}
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}}>
          <button onClick={onClose}>Cancel</button>
          <button onClick={onSave} disabled={!token} style={{background:'#FC6D26',color:'#fff',border:'none',fontWeight:500}}>Save & connect</button>
        </div>
      </div>
    </div>
  );
}

function CardItem({ card, col, votes, reactions, comments, commentInput, expandedCard, creatingIssue,
  onVote, onReact, onDelete, onExpand, onCommentChange, onAddComment, onCreateIssue, onUpdate, onMarkAction }) {
  const isExp = expandedCard === card.id;
  const vc = votes[card.id] || 0;
  const cr = reactions[card.id] || {};
  const cc = comments[card.id] || [];
  const EMOJIS = ['👍','❤️','💡','🎉','🤔'];
  return (
    <div style={{background:'#fff',borderRadius:8,border:'1px solid rgba(0,0,0,0.08)',overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,0.04)'}}>
      <div style={{padding:'9px 11px'}}>
        <p style={{fontSize:13,lineHeight:1.55,marginBottom:7}}>{card.text}</p>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:6}}>
          <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:11,color:'#999'}}>{card.author}</span>
            {card.isActionItem && <Badge bg="#fff8e6" color="#6b3c00">action</Badge>}
            {card.gitlabIssueUrl && <a href={card.gitlabIssueUrl} target="_blank" rel="noopener" style={{fontSize:11,padding:'1px 6px',borderRadius:20,background:'#e6f9f0',color:'#0a5a38',textDecoration:'none',fontWeight:500}}>#{card.gitlabIssueId}</a>}
          </div>
          <div style={{display:'flex',gap:3}}>
            <button onClick={onVote} style={{fontSize:11,padding:'2px 8px',display:'flex',alignItems:'center',gap:3}} aria-label="Vote">
              <i className="ti ti-arrow-up" style={{fontSize:11}}/> {vc}
            </button>
            <button onClick={onExpand} style={{fontSize:11,padding:'2px 8px'}} aria-label={isExp?'Collapse':'Expand'}>
              <i className={`ti ${isExp?'ti-chevron-up':'ti-chevron-down'}`} style={{fontSize:11}}/>
            </button>
            <button onClick={onDelete} style={{fontSize:11,padding:'2px 8px',color:'#e74c3c'}} aria-label="Delete">
              <i className="ti ti-trash" style={{fontSize:11}}/>
            </button>
          </div>
        </div>
        {Object.keys(cr).length > 0 && (
          <div style={{display:'flex',gap:4,marginTop:6,flexWrap:'wrap'}}>
            {Object.entries(cr).map(([e,c])=>(
              <span key={e} style={{fontSize:12,padding:'1px 7px',borderRadius:20,background:'#f4f5f7',border:'1px solid rgba(0,0,0,0.08)'}}>{e} {c}</span>
            ))}
          </div>
        )}
      </div>
      {isExp && (
        <div style={{borderTop:'1px solid rgba(0,0,0,0.07)',padding:'10px 11px',display:'flex',flexDirection:'column',gap:9,background:'#fafbfc'}}>
          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
            {EMOJIS.map(e=><button key={e} onClick={()=>onReact(e)} style={{fontSize:15,padding:'3px 7px',border:'1px solid rgba(0,0,0,0.08)',borderRadius:8,background:'#fff'}} aria-label={`React ${e}`}>{e}</button>)}
          </div>
          <div style={{display:'flex',gap:6}}>
            <input value={card.assignee||''} onChange={e=>onUpdate({assignee:e.target.value})} placeholder="Assignee" style={{flex:1,fontSize:12,padding:'5px 8px'}}/>
            <input type="date" value={card.dueDate||''} onChange={e=>onUpdate({dueDate:e.target.value})} style={{flex:1,fontSize:12,padding:'5px 8px'}}/>
          </div>
          <div style={{display:'flex',gap:6}}>
            <button onClick={onMarkAction} style={{flex:1,fontSize:12,padding:'5px 0',display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
              <i className={`ti ${card.isActionItem?'ti-checkbox':'ti-square'}`} style={{fontSize:13}}/>
              {card.isActionItem?'Remove action':'Mark as action'}
            </button>
            {!card.gitlabIssueUrl ? (
              <button onClick={onCreateIssue} disabled={creatingIssue[card.id]} style={{flex:1,fontSize:12,padding:'5px 0',display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
                <GitLabLogo size={14}/>{creatingIssue[card.id]?'Creating...':'Create GitLab issue'}
              </button>
            ) : (
              <a href={card.gitlabIssueUrl} target="_blank" rel="noopener" style={{flex:1,fontSize:12,padding:'5px 0',textAlign:'center',textDecoration:'none',border:'1px solid rgba(0,0,0,0.1)',borderRadius:7,color:'#1a1a2e',display:'flex',alignItems:'center',justifyContent:'center',gap:5,background:'#fff'}}>
                <GitLabLogo size={14}/>View #{card.gitlabIssueId}
              </a>
            )}
          </div>
          {cc.length > 0 && (
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              {cc.map(c=>(
                <div key={c.id} style={{fontSize:12,padding:'6px 9px',background:'#fff',borderRadius:7,border:'1px solid rgba(0,0,0,0.07)'}}>
                  <span style={{color:'#999',marginRight:6,fontWeight:500}}>{c.author}:</span>{c.text}
                </div>
              ))}
            </div>
          )}
          <div style={{display:'flex',gap:6}}>
            <input value={commentInput[card.id]||''} onChange={e=>onCommentChange(e.target.value)} onKeyDown={e=>e.key==='Enter'&&onAddComment()} placeholder="Add a comment…" style={{flex:1,fontSize:12,padding:'5px 8px'}}/>
            <button onClick={onAddComment} style={{fontSize:12,padding:'5px 12px'}}>Post</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ActionRow({ card, col, creatingIssue, onCreateIssue, onUpdate }) {
  const SC = { open:{bg:'#e8f0fe',tc:'#0d3a78'}, in_progress:{bg:'#fff8e6',tc:'#6b3c00'}, done:{bg:'#e6f9f0',tc:'#0a5a38'} };
  const s = SC[card.status] || SC.open;
  return (
    <div style={{background:'#fff',border:'1px solid rgba(0,0,0,0.08)',borderRadius:10,padding:'11px 14px',display:'flex',alignItems:'flex-start',gap:11,boxShadow:'0 1px 4px rgba(0,0,0,0.04)'}}>
      <i className={`ti ${col?.icon||'ti-checkbox'}`} style={{fontSize:17,color:col?.color,marginTop:2,flexShrink:0}}/>
      <div style={{flex:1,minWidth:0}}>
        <p style={{fontSize:14,marginBottom:6,lineHeight:1.5}}>{card.text}</p>
        <div style={{display:'flex',gap:7,flexWrap:'wrap',alignItems:'center'}}>
          <Badge bg={s.bg} color={s.tc}>{card.status?.replace('_',' ')}</Badge>
          {card.assignee && <span style={{fontSize:12,color:'#666'}}><i className="ti ti-user" style={{fontSize:12,marginRight:3}}/>{card.assignee}</span>}
          {card.dueDate && <span style={{fontSize:12,color:'#666'}}><i className="ti ti-calendar" style={{fontSize:12,marginRight:3}}/>{card.dueDate}</span>}
        </div>
      </div>
      <div style={{display:'flex',gap:6,flexShrink:0,alignItems:'center'}}>
        <select value={card.status||'open'} onChange={e=>onUpdate({status:e.target.value})} style={{fontSize:12,padding:'4px 8px',width:'auto'}}>
          <option value="open">Open</option>
          <option value="in_progress">In progress</option>
          <option value="done">Done</option>
        </select>
        {!card.gitlabIssueUrl ? (
          <button onClick={onCreateIssue} disabled={creatingIssue[card.id]} style={{fontSize:12,padding:'5px 11px',display:'flex',alignItems:'center',gap:5,whiteSpace:'nowrap'}}>
            <GitLabLogo size={13}/>{creatingIssue[card.id]?'...':'Create issue'}
          </button>
        ) : (
          <a href={card.gitlabIssueUrl} target="_blank" rel="noopener" style={{fontSize:12,padding:'5px 11px',textDecoration:'none',border:'1px solid rgba(0,0,0,0.1)',borderRadius:7,color:'#1a1a2e',display:'flex',alignItems:'center',gap:5,background:'#fff',whiteSpace:'nowrap'}}>
            <GitLabLogo size={13}/>#{card.gitlabIssueId}
          </a>
        )}
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('setup');
  const [glToken, setGlToken] = useState(() => localStorage.getItem('retro_gl_token') || '');
  const [glProjects, setGlProjects] = useState([]);
  const [selProject, setSelProject] = useState(() => localStorage.getItem('retro_gl_project') || '');
  const [selProjectName, setSelProjectName] = useState(() => localStorage.getItem('retro_gl_project_name') || '');
  const [loadingProj, setLoadingProj] = useState(false);
  const [tokenErr, setTokenErr] = useState('');
  const [boardName, setBoardName] = useState('P2 Release Retrospective');
  const [boardDesc, setBoardDesc] = useState('Reflect on the P2 release cycle — celebrating wins, identifying improvements, and defining action items.');
  const [sprintTag, setSprintTag] = useState('P2 Release');
  const [authorName, setAuthorName] = useState('');
  const [anonMode, setAnonMode] = useState(false);
  const [cards, setCards] = useState({ went_well:[], improve:[], suggestions:[], actions:[], shoutouts:[] });
  const [newText, setNewText] = useState({});
  const [votes, setVotes] = useState({});
  const [reactions, setReactions] = useState({});
  const [comments, setComments] = useState({});
  const [commentInput, setCommentInput] = useState({});
  const [expandedCard, setExpandedCard] = useState(null);
  const [creatingIssue, setCreatingIssue] = useState({});
  const [saving, setSaving] = useState(false);
  const [boardSaved, setBoardSaved] = useState(false);
  const [activeTab, setActiveTab] = useState('board');
  const [showTokenModal, setShowTokenModal] = useState(false);
  const [notif, setNotif] = useState(null);

  const notify = (msg, type='success') => { setNotif({msg,type}); };

  const fetchProjects = useCallback(async (token) => {
    if (!token) return;
    setLoadingProj(true); setTokenErr('');
    try {
      const res = await fetch(`${GITLAB_URL}/api/v4/groups/${GITLAB_GROUP}/projects?per_page=50&simple=true`, { headers: {'PRIVATE-TOKEN': token} });
      if (!res.ok) throw new Error('Invalid token or no access');
      const data = await res.json();
      setGlProjects(data);
      if (data.length > 0 && !selProject) { setSelProject(String(data[0].id)); setSelProjectName(data[0].name); }
    } catch(e) { setTokenErr(e.message); }
    setLoadingProj(false);
  }, [selProject]);

  useEffect(() => { if (glToken) fetchProjects(glToken); }, []);

  const saveToken = () => {
    localStorage.setItem('retro_gl_token', glToken);
    localStorage.setItem('retro_gl_project', selProject);
    const p = glProjects.find(p=>String(p.id)===selProject);
    if (p) { localStorage.setItem('retro_gl_project_name', p.name); setSelProjectName(p.name); }
    fetchProjects(glToken);
    setShowTokenModal(false);
    notify('GitLab connected successfully');
  };

  const addCard = (colId) => {
    const text = newText[colId]?.trim(); if (!text) return;
    const card = { id:uid(), text, author: anonMode?'Anonymous':(authorName||'You'), createdAt:new Date().toISOString(), assignee:'', dueDate:'', gitlabIssueUrl:'', gitlabIssueId:null, isActionItem: colId==='actions', status:'open' };
    setCards(prev=>({...prev,[colId]:[...prev[colId],card]}));
    setNewText(prev=>({...prev,[colId]:''}));
  };

  const deleteCard = (colId, cardId) => { setCards(prev=>({...prev,[colId]:prev[colId].filter(c=>c.id!==cardId)})); if(expandedCard===cardId) setExpandedCard(null); };
  const updateCard = (colId, cardId, upd) => setCards(prev=>({...prev,[colId]:prev[colId].map(c=>c.id===cardId?{...c,...upd}:c)}));
  const toggleVote = (cardId) => setVotes(prev=>({...prev,[cardId]:(prev[cardId]||0)+1}));
  const addReaction = (cardId, emoji) => setReactions(prev=>({...prev,[cardId]:{...(prev[cardId]||{}),[emoji]:((prev[cardId]||{})[emoji]||0)+1}}));
  const addComment = (cardId) => {
    const text = commentInput[cardId]?.trim(); if (!text) return;
    setComments(prev=>({...prev,[cardId]:[...(prev[cardId]||[]),{id:uid(),text,author:anonMode?'Anonymous':(authorName||'You'),ts:new Date().toISOString()}]}));
    setCommentInput(prev=>({...prev,[cardId]:''}));
  };

  const createGitlabIssue = async (colId, card) => {
    if (!glToken || !selProject) { setShowTokenModal(true); return; }
    setCreatingIssue(prev=>({...prev,[card.id]:true}));
    try {
      const col = COLUMNS.find(c=>c.id===colId);
      const labels = `retro,${sprintTag.toLowerCase().replace(/\s+/g,'-')}`;
      const desc = `**Retro Board:** ${boardName}\n**Sprint/Release:** ${sprintTag}\n**Column:** ${col?.title}\n\n${card.text}${card.assignee?`\n\n**Assigned to:** ${card.assignee}`:''}${card.dueDate?`\n**Due:** ${card.dueDate}`:''}`;
      const res = await fetch(`${GITLAB_URL}/api/v4/projects/${selProject}/issues`, {
        method:'POST', headers:{'PRIVATE-TOKEN':glToken,'Content-Type':'application/json'},
        body:JSON.stringify({ title: card.text.length>80?card.text.slice(0,80)+'…':card.text, description:desc, labels })
      });
      if (!res.ok) throw new Error('Failed to create issue');
      const issue = await res.json();
      updateCard(colId, card.id, {gitlabIssueUrl:issue.web_url, gitlabIssueId:issue.iid, status:'in_progress'});
      notify(`GitLab issue #${issue.iid} created`);
    } catch(e) { notify('Failed: '+e.message, 'error'); }
    setCreatingIssue(prev=>({...prev,[card.id]:false}));
  };

  const saveBoardToGitlab = async () => {
    if (!glToken || !selProject) { setShowTokenModal(true); return; }
    setSaving(true);
    try {
      const md = `# ${boardName}\n\n> ${boardDesc}\n\n**Sprint/Release:** ${sprintTag}  \n**Date:** ${new Date().toLocaleDateString()}\n\n---\n\n${COLUMNS.map(col=>`## ${col.title}\n\n${cards[col.id].length===0?'_No items_':cards[col.id].map(c=>`- ${c.text}${c.gitlabIssueUrl?` ([#${c.gitlabIssueId}](${c.gitlabIssueUrl}))`:''}${c.assignee?` — @${c.assignee}`:''}`).join('\n')}`).join('\n\n')}\n\n---\n_Generated by Retro Board_`;
      const filename = `retros/${sprintTag.replace(/\s+/g,'-').toLowerCase()}-${Date.now()}.md`;
      const res = await fetch(`${GITLAB_URL}/api/v4/projects/${selProject}/repository/files/${encodeURIComponent(filename)}`, {
        method:'POST', headers:{'PRIVATE-TOKEN':glToken,'Content-Type':'application/json'},
        body:JSON.stringify({ branch:'main', content:md, commit_message:`Add retro: ${boardName}` })
      });
      if (!res.ok) { const e=await res.json(); throw new Error(e.message||'Save failed'); }
      setBoardSaved(true);
      notify('Board saved to GitLab repository');
    } catch(e) { notify('Save failed: '+e.message, 'error'); }
    setSaving(false);
  };

  const allActions = COLUMNS.flatMap(col => cards[col.id].filter(c=>c.isActionItem||col.id==='actions').map(c=>({...c,colId:col.id})));
  const totalCards = Object.values(cards).flat().length;
  const linkedIssues = Object.values(cards).flat().filter(c=>c.gitlabIssueUrl).length;

  const TEMPLATES = [
    { name:'P2 Release Retrospective', desc:'Reflect on the P2 release cycle — celebrating wins, identifying improvements, and defining action items.' },
    { name:'Sprint Retrospective', desc:'Team retrospective for the current sprint.' },
    { name:'Custom', desc:'' },
  ];

  if (screen === 'setup') return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'2rem',background:'linear-gradient(135deg,#fff5f0 0%,#f4f5f7 60%)'}}>
      <div style={{width:'100%',maxWidth:540}}>
        <div style={{textAlign:'center',marginBottom:'2rem'}}>
          <div style={{width:52,height:52,borderRadius:14,background:'#FC6D26',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',boxShadow:'0 8px 24px rgba(252,109,38,0.3)'}}>
            <i className="ti ti-layout-kanban" style={{fontSize:26,color:'#fff'}}/>
          </div>
          <h1 style={{fontSize:22,fontWeight:700,marginBottom:6}}>Retro Board</h1>
          <p style={{fontSize:14,color:'#666'}}>enlight360containers · git.enlight.dev</p>
        </div>

        <div style={{background:'#fff',borderRadius:14,padding:'1.5rem',boxShadow:'0 4px 24px rgba(0,0,0,0.07)',marginBottom:'1rem'}}>
          <p style={{fontSize:12,fontWeight:600,color:'#999',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10}}>Quick templates</p>
          <div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:'1.25rem'}}>
            {TEMPLATES.map(t=>(
              <button key={t.name} onClick={()=>{setBoardName(t.name);if(t.desc)setBoardDesc(t.desc);}} style={{fontSize:13,padding:'5px 13px',borderRadius:20,border: boardName===t.name?'1.5px solid #FC6D26':'1px solid rgba(0,0,0,0.1)',background:boardName===t.name?'#fff5f0':'#f8f9fa',color:boardName===t.name?'#FC6D26':'#444',fontWeight:boardName===t.name?600:400}}>{t.name}</button>
            ))}
          </div>

          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div>
              <label style={{fontSize:12,fontWeight:600,color:'#555',display:'block',marginBottom:5}}>Board name</label>
              <input value={boardName} onChange={e=>setBoardName(e.target.value)} placeholder="e.g. P2 Release Retrospective"/>
            </div>
            <div>
              <label style={{fontSize:12,fontWeight:600,color:'#555',display:'block',marginBottom:5}}>Description</label>
              <textarea value={boardDesc} onChange={e=>setBoardDesc(e.target.value)} rows={2} style={{resize:'vertical'}}/>
            </div>
            <div style={{display:'flex',gap:10}}>
              <div style={{flex:1}}>
                <label style={{fontSize:12,fontWeight:600,color:'#555',display:'block',marginBottom:5}}>Sprint / release tag</label>
                <input value={sprintTag} onChange={e=>setSprintTag(e.target.value)} placeholder="e.g. P2 Release"/>
              </div>
              <div style={{flex:1}}>
                <label style={{fontSize:12,fontWeight:600,color:'#555',display:'block',marginBottom:5}}>Your name (optional)</label>
                <input value={authorName} onChange={e=>setAuthorName(e.target.value)} placeholder="e.g. John"/>
              </div>
            </div>
            <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:14}}>
              <input type="checkbox" checked={anonMode} onChange={e=>setAnonMode(e.target.checked)} style={{width:16,height:16}}/>
              Enable anonymous mode
            </label>
          </div>
        </div>

        <div style={{background:'#fff',borderRadius:14,padding:'1.25rem',boxShadow:'0 4px 24px rgba(0,0,0,0.07)',marginBottom:'1rem'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:7}}>
              <GitLabLogo size={18}/>
              <span style={{fontSize:14,fontWeight:600}}>GitLab integration</span>
              <Badge bg={glToken&&glProjects.length>0?'#e6f9f0':'#fff8e6'} color={glToken&&glProjects.length>0?'#0a6640':'#7a4f00'}>
                {glToken&&glProjects.length>0?'connected':'not connected'}
              </Badge>
            </div>
            <button onClick={()=>setShowTokenModal(true)} style={{fontSize:12,padding:'5px 11px'}}><i className="ti ti-settings" style={{marginRight:4}}/>Configure</button>
          </div>
          {glToken&&glProjects.length>0 ? (
            <div>
              <label style={{fontSize:12,fontWeight:600,color:'#555',display:'block',marginBottom:5}}>Project for issue tracking</label>
              <select value={selProject} onChange={e=>{setSelProject(e.target.value);const p=glProjects.find(p=>String(p.id)===e.target.value);if(p)setSelProjectName(p.name);}}>
                {glProjects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </div>
          ) : (
            <p style={{fontSize:13,color:'#888'}}>Connect to create GitLab issues from action items and save the board to your repository.</p>
          )}
        </div>

        <button onClick={()=>{if(!boardName.trim())return;setScreen('board');}} style={{width:'100%',padding:'12px',fontSize:15,fontWeight:600,background:'#FC6D26',color:'#fff',border:'none',borderRadius:10,boxShadow:'0 4px 16px rgba(252,109,38,0.3)'}}>
          <i className="ti ti-layout-kanban" style={{marginRight:8}}/>Start retro board
        </button>
      </div>
      {showTokenModal && <TokenModal token={glToken} setToken={setGlToken} onFetch={()=>fetchProjects(glToken)} onSave={saveToken} onClose={()=>setShowTokenModal(false)} error={tokenErr} loading={loadingProj} projects={glProjects} selProject={selProject} setSelProject={setSelProject}/>}
    </div>
  );

  return (
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      {notif && <Notification msg={notif.msg} type={notif.type} onDone={()=>setNotif(null)}/>}

      <div style={{background:'#fff',borderBottom:'1px solid rgba(0,0,0,0.08)',padding:'0 1.5rem',position:'sticky',top:0,zIndex:100,boxShadow:'0 1px 8px rgba(0,0,0,0.05)'}}>
        <div style={{maxWidth:1400,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',height:54}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:32,height:32,borderRadius:8,background:'#FC6D26',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <i className="ti ti-layout-kanban" style={{fontSize:17,color:'#fff'}}/>
            </div>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:7}}>
                <span style={{fontSize:15,fontWeight:600}}>{boardName}</span>
                <Badge bg="#fff5f0" color="#b84800">{sprintTag}</Badge>
              </div>
            </div>
          </div>
          <div style={{display:'flex',gap:7,alignItems:'center'}}>
            {glToken&&selProject && (
              <button onClick={saveBoardToGitlab} disabled={saving} style={{fontSize:13,padding:'6px 13px',display:'flex',alignItems:'center',gap:6}}>
                <GitLabLogo size={14}/>{saving?'Saving…':boardSaved?'✓ Saved':'Save to GitLab'}
              </button>
            )}
            <button onClick={()=>setShowTokenModal(true)} style={{padding:'6px 10px',fontSize:14}} aria-label="GitLab settings"><GitLabLogo size={15}/></button>
            <button onClick={()=>setScreen('setup')} style={{padding:'6px 10px',fontSize:13}} aria-label="Settings"><i className="ti ti-settings"/></button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:1400,margin:'0 auto',padding:'1.25rem 1.5rem'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:'1.25rem'}}>
          {[{l:'Total cards',v:totalCards,i:'ti-cards'},{l:'Action items',v:allActions.length,i:'ti-checkbox'},{l:'GitLab issues',v:linkedIssues,i:'ti-brand-gitlab'},{l:'Participants',v:1,i:'ti-users'}].map(s=>(
            <div key={s.l} style={{background:'#fff',borderRadius:10,padding:'12px 16px',border:'1px solid rgba(0,0,0,0.07)',boxShadow:'0 1px 4px rgba(0,0,0,0.04)'}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                <i className={`ti ${s.i}`} style={{fontSize:15,color:'#FC6D26'}}/>
                <span style={{fontSize:12,color:'#888'}}>{s.l}</span>
              </div>
              <span style={{fontSize:24,fontWeight:700}}>{s.v}</span>
            </div>
          ))}
        </div>

        <div style={{display:'flex',gap:2,marginBottom:'1.25rem',borderBottom:'2px solid rgba(0,0,0,0.07)'}}>
          {[{id:'board',l:'Board',i:'ti-layout-kanban'},{id:'actions',l:'Action items',i:'ti-checkbox'},{id:'summary',l:'Summary',i:'ti-file-description'}].map(t=>(
            <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{fontSize:13,padding:'9px 18px',border:'none',borderBottom: activeTab===t.id?'2px solid #FC6D26':'2px solid transparent',borderRadius:0,background:'transparent',color:activeTab===t.id?'#FC6D26':'#666',cursor:'pointer',fontWeight:activeTab===t.id?600:400,display:'flex',alignItems:'center',gap:6,marginBottom:'-2px'}}>
              <i className={`ti ${t.i}`} style={{fontSize:14}}/>{t.l}
            </button>
          ))}
        </div>

        {activeTab==='board' && (
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10}}>
            {COLUMNS.map(col=>(
              <div key={col.id} style={{background:'#fff',borderRadius:12,border:'1px solid rgba(0,0,0,0.07)',overflow:'hidden',boxShadow:'0 1px 6px rgba(0,0,0,0.05)'}}>
                <div style={{padding:'11px 13px',borderBottom:`3px solid ${col.color}`,display:'flex',alignItems:'center',gap:7,background:col.bg}}>
                  <i className={`ti ${col.icon}`} style={{fontSize:15,color:col.color}}/>
                  <span style={{fontSize:13,fontWeight:600,flex:1,color:col.tc}}>{col.title}</span>
                  <span style={{fontSize:11,padding:'1px 8px',borderRadius:20,background:'rgba(255,255,255,0.7)',color:col.tc,fontWeight:600}}>{cards[col.id].length}</span>
                </div>
                <div style={{padding:10,display:'flex',flexDirection:'column',gap:7,minHeight:100}}>
                  {cards[col.id].map(card=>(
                    <CardItem key={card.id} card={card} col={col} votes={votes} reactions={reactions} comments={comments} commentInput={commentInput} expandedCard={expandedCard} creatingIssue={creatingIssue}
                      onVote={()=>toggleVote(card.id)} onReact={e=>addReaction(card.id,e)} onDelete={()=>deleteCard(col.id,card.id)}
                      onExpand={()=>setExpandedCard(expandedCard===card.id?null:card.id)}
                      onCommentChange={v=>setCommentInput(p=>({...p,[card.id]:v}))} onAddComment={()=>addComment(card.id)}
                      onCreateIssue={()=>createGitlabIssue(col.id,card)} onUpdate={u=>updateCard(col.id,card.id,u)}
                      onMarkAction={()=>updateCard(col.id,card.id,{isActionItem:!card.isActionItem})}
                    />
                  ))}
                  <div style={{display:'flex',gap:5,marginTop:2}}>
                    <input value={newText[col.id]||''} onChange={e=>setNewText(p=>({...p,[col.id]:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&addCard(col.id)} placeholder="Add a card…" style={{flex:1,fontSize:12,padding:'6px 9px'}}/>
                    <button onClick={()=>addCard(col.id)} style={{padding:'6px 10px'}} aria-label="Add"><i className="ti ti-plus" style={{fontSize:13}}/></button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {activeTab==='actions' && (
          <div>
            {allActions.length===0 ? (
              <div style={{textAlign:'center',padding:'4rem',color:'#aaa'}}>
                <i className="ti ti-checkbox" style={{fontSize:40,display:'block',marginBottom:10}}/>
                <p style={{fontSize:14}}>No action items yet. Add cards to the Action Items column or mark any card as an action item.</p>
              </div>
            ) : (
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {allActions.map(card=>(
                  <ActionRow key={card.id} card={card} col={COLUMNS.find(c=>c.id===card.colId)} creatingIssue={creatingIssue}
                    onCreateIssue={()=>createGitlabIssue(card.colId,card)} onUpdate={u=>updateCard(card.colId,card.id,u)}
                  />
                ))}
              </div>
            )}
          </div>
        )}

        {activeTab==='summary' && (
          <div style={{maxWidth:700}}>
            <div style={{background:'#fff',borderRadius:12,padding:'1.25rem',border:'1px solid rgba(0,0,0,0.07)',marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.05)'}}>
              <h2 style={{fontSize:17,fontWeight:700,marginBottom:4}}>{boardName}</h2>
              <p style={{fontSize:13,color:'#666',marginBottom:10}}>{boardDesc}</p>
              <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                <Badge bg="#fff5f0" color="#b84800">{sprintTag}</Badge>
                <Badge bg="#f4f5f7" color="#555">{new Date().toLocaleDateString()}</Badge>
              </div>
            </div>
            {COLUMNS.map(col=>(
              <div key={col.id} style={{background:'#fff',borderRadius:12,padding:'1rem 1.25rem',border:'1px solid rgba(0,0,0,0.07)',marginBottom:10,boxShadow:'0 1px 6px rgba(0,0,0,0.05)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                  <i className={`ti ${col.icon}`} style={{color:col.color,fontSize:15}}/>
                  <span style={{fontSize:14,fontWeight:600}}>{col.title}</span>
                  <span style={{fontSize:12,color:'#999'}}>({cards[col.id].length})</span>
                </div>
                {cards[col.id].length===0 ? <p style={{fontSize:13,color:'#aaa'}}>No items</p> : (
                  <ul style={{paddingLeft:18,display:'flex',flexDirection:'column',gap:6}}>
                    {cards[col.id].map(c=>(
                      <li key={c.id} style={{fontSize:13,lineHeight:1.5}}>
                        {c.text}
                        {c.gitlabIssueUrl && <a href={c.gitlabIssueUrl} target="_blank" rel="noopener" style={{marginLeft:8,fontSize:12}}> #{c.gitlabIssueId} <i className="ti ti-external-link" style={{fontSize:10}}/></a>}
                      </li>
                    ))}
                  </ul>
                )}
              </div>
            ))}
            {glToken&&selProject && (
              <button onClick={saveBoardToGitlab} disabled={saving} style={{width:'100%',padding:'11px',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:8,background:'#FC6D26',color:'#fff',border:'none',borderRadius:10}}>
                <GitLabLogo size={16}/>{saving?'Saving…':boardSaved?'✓ Saved to GitLab':'Save board to GitLab repository'}
              </button>
            )}
          </div>
        )}
      </div>

      {showTokenModal && <TokenModal token={glToken} setToken={setGlToken} onFetch={()=>fetchProjects(glToken)} onSave={saveToken} onClose={()=>setShowTokenModal(false)} error={tokenErr} loading={loadingProj} projects={glProjects} selProject={selProject} setSelProject={setSelProject}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
