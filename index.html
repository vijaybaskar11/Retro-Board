<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Retro Board — enlight360containers</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #f4f5f7; --surface: #ffffff; --surface2: #f8f9fa; --border: rgba(0,0,0,0.1); --text: #1a1a2e; --accent: #FC6D26; --radius-sm: 7px; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  input, textarea, select { font-family: inherit; font-size: 13px; color: var(--text); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 10px; outline: none; width: 100%; }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(252,109,38,0.12); }
  button { font-family: inherit; font-size: 13px; cursor: pointer; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); color: var(--text); padding: 7px 14px; transition: background 0.15s; }
  button:hover { background: var(--surface2); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  @keyframes spin { to { transform: rotate(360deg); } }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const BIN_ID = "6a26ab2af5f4af5e29caede5";
const BIN_KEY = "$2a$10$HqmzhdqG3Ep5d7dxqPfRz.OobHmdu8K9fUecqLgWxBPHI/LS4kH4.";
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const HEADERS = { "Content-Type": "application/json", "X-Master-Key": BIN_KEY };
const POLL_INTERVAL = 5000;

const COLUMNS = [
  { id: "went_well",   title: "What Went Well",         icon: "ti-circle-check",   color: "#1D9E75", bg: "#e6f9f0", tc: "#0a5a38" },
  { id: "improve",     title: "What Could Be Improved", icon: "ti-alert-triangle", color: "#D85A30", bg: "#fff0ea", tc: "#7a2a10" },
  { id: "suggestions", title: "Suggestions / Ideas",    icon: "ti-bulb",           color: "#185FA5", bg: "#e8f0fe", tc: "#0d3a78" },
  { id: "actions",     title: "Action Items",           icon: "ti-checkbox",       color: "#BA7517", bg: "#fff8e6", tc: "#6b3c00" },
];

const FRESH_BOARD = {
  name: "P2 Release Retrospective",
  desc: "Reflect on the P2 release cycle — celebrating wins, identifying improvements, and defining action items.",
  sprintTag: "P2 Release",
  cards: { went_well: [], improve: [], suggestions: [], actions: [] },
  votes: {}, reactions: {}, comments: {}
};

const uid = () => Math.random().toString(36).substr(2, 9);

async function fetchBoard() {
  const res = await fetch(`${BIN_URL}/latest`, { headers: { "X-Master-Key": BIN_KEY } });
  if (!res.ok) throw new Error("Failed to fetch");
  const data = await res.json();
  return data.record;
}

async function saveBoard(board) {
  const res = await fetch(BIN_URL, { method: "PUT", headers: HEADERS, body: JSON.stringify(board) });
  if (!res.ok) throw new Error("Failed to save");
  return res.json();
}

function Spinner() {
  return <div style={{width:16,height:16,border:'2px solid rgba(0,0,0,0.1)',borderTop:'2px solid #FC6D26',borderRadius:'50%',animation:'spin 0.7s linear infinite',display:'inline-block'}}/>;
}

function Notif({ msg, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3500); return () => clearTimeout(t); }, []);
  return (
    <div style={{position:'fixed',top:18,right:18,zIndex:9999,padding:'10px 18px',borderRadius:10,
      background:type==='error'?'#fdecea':'#e6f9f0',color:type==='error'?'#c0392b':'#0a6640',
      border:`1px solid ${type==='error'?'#f5c6c6':'#b2dfcf'}`,boxShadow:'0 4px 20px rgba(0,0,0,0.12)',
      fontSize:14,fontWeight:500,display:'flex',alignItems:'center',gap:8}}>
      <i className={`ti ${type==='error'?'ti-alert-circle':'ti-circle-check'}`}/>{msg}
    </div>
  );
}

function Badge({ children, bg, color }) {
  return <span style={{fontSize:11,padding:'2px 8px',borderRadius:20,background:bg,color,fontWeight:500,whiteSpace:'nowrap'}}>{children}</span>;
}

function App() {
  const [userName, setUserName] = useState(() => localStorage.getItem('retro_username') || '');
  const [nameInput, setNameInput] = useState('');
  const [joined, setJoined] = useState(!!localStorage.getItem('retro_username'));
  const [board, setBoard] = useState(null);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [lastSync, setLastSync] = useState(null);
  const [notif, setNotif] = useState(null);
  const [newText, setNewText] = useState({});
  const [expandedCard, setExpandedCard] = useState(null);
  const [commentInput, setCommentInput] = useState({});
  const [activeTab, setActiveTab] = useState('board');
  const saveLock = useRef(false);

  const notify = (msg, type='success') => setNotif({msg,type});

  const normalizeBoard = (data) => {
    // Always ensure only 4 columns exist, remove shoutouts if present
    const cards = {
      went_well: data.cards?.went_well || [],
      improve: data.cards?.improve || [],
      suggestions: data.cards?.suggestions || [],
      actions: data.cards?.actions || [],
    };
    return { ...FRESH_BOARD, ...data, cards };
  };

  const loadBoard = useCallback(async (silent=false) => {
    try {
      if (!silent) setLoading(true);
      const data = await fetchBoard();
      if (data && data.cards) {
        setBoard(normalizeBoard(data));
      } else {
        await saveBoard(FRESH_BOARD);
        setBoard(FRESH_BOARD);
      }
      setLastSync(new Date());
    } catch(e) { if (!silent) notify('Failed to load: '+e.message, 'error'); }
    if (!silent) setLoading(false);
  }, []);

  useEffect(() => {
    if (joined) {
      loadBoard();
      const poll = setInterval(() => { if (!saveLock.current) loadBoard(true); }, POLL_INTERVAL);
      return () => clearInterval(poll);
    }
  }, [joined]);

  const save = async (updated) => {
    if (saveLock.current) return;
    saveLock.current = true; setSyncing(true);
    try { await saveBoard(updated); setLastSync(new Date()); }
    catch(e) { notify('Sync failed: '+e.message, 'error'); }
    setSyncing(false); saveLock.current = false;
  };

  const addCard = async (colId) => {
    const text = newText[colId]?.trim(); if (!text) return;
    const card = { id:uid(), text, author:userName, createdAt:new Date().toISOString(), assignee:'', dueDate:'', isActionItem:colId==='actions', status:'open' };
    const updated = {...board, cards:{...board.cards,[colId]:[...board.cards[colId],card]}};
    setBoard(updated); setNewText(p=>({...p,[colId]:''}));
    await save(updated);
  };

  const deleteCard = async (colId, cardId) => {
    const updated = {...board, cards:{...board.cards,[colId]:board.cards[colId].filter(c=>c.id!==cardId)}};
    setBoard(updated); if (expandedCard===cardId) setExpandedCard(null);
    await save(updated);
  };

  const updateCard = async (colId, cardId, upd) => {
    const updated = {...board, cards:{...board.cards,[colId]:board.cards[colId].map(c=>c.id===cardId?{...c,...upd}:c)}};
    setBoard(updated); await save(updated);
  };

  const toggleVote = async (cardId) => {
    const updated = {...board, votes:{...board.votes,[cardId]:(board.votes[cardId]||0)+1}};
    setBoard(updated); await save(updated);
  };

  const addReaction = async (cardId, emoji) => {
    const curr = board.reactions[cardId]||{};
    const updated = {...board, reactions:{...board.reactions,[cardId]:{...curr,[emoji]:(curr[emoji]||0)+1}}};
    setBoard(updated); await save(updated);
  };

  const addComment = async (cardId) => {
    const text = commentInput[cardId]?.trim(); if (!text) return;
    const comment = {id:uid(),text,author:userName,ts:new Date().toISOString()};
    const updated = {...board, comments:{...board.comments,[cardId]:[...(board.comments[cardId]||[]),comment]}};
    setBoard(updated); setCommentInput(p=>({...p,[cardId]:''}));
    await save(updated);
  };

  const exportSummary = () => {
    const md = `# ${board.name}\n\n> ${board.desc}\n\n**Sprint/Release:** ${board.sprintTag}\n**Date:** ${new Date().toLocaleDateString()}\n\n---\n\n${COLUMNS.map(col=>`## ${col.title}\n\n${board.cards[col.id].length===0?'_No items_':board.cards[col.id].map(c=>`- ${c.text} — ${c.author}${c.assignee?` (Assignee: ${c.assignee})`:''}${c.dueDate?` (Due: ${c.dueDate})`:''}${c.status&&c.status!=='open'?` [${c.status}]`:''}`).join('\n')}`).join('\n\n')}\n\n---\n_Generated by Retro Board_`;
    const blob = new Blob([md], {type:'text/markdown'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`${board.sprintTag.replace(/\s+/g,'-').toLowerCase()}-retro.md`; a.click();
    URL.revokeObjectURL(url); notify('Summary downloaded!');
  };

  const resetBoard = async () => {
    const pwd = prompt('Enter admin password:');
    if (pwd !== 'enlight@retro') { notify('Incorrect password', 'error'); return; }
    const fresh = {...FRESH_BOARD, createdAt: new Date().toISOString()};
    setBoard(fresh); await save(fresh); notify('Board reset');
  };

  const joinBoard = () => {
    const name = nameInput.trim(); if (!name) return;
    localStorage.setItem('retro_username', name);
    setUserName(name); setJoined(true);
  };

  if (!joined) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'2rem',background:'linear-gradient(135deg,#fff5f0 0%,#f4f5f7 60%)'}}>
      <div style={{width:'100%',maxWidth:400,textAlign:'center'}}>
        <div style={{width:60,height:60,borderRadius:18,background:'#FC6D26',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 18px',boxShadow:'0 8px 24px rgba(252,109,38,0.3)'}}>
          <i className="ti ti-layout-kanban" style={{fontSize:30,color:'#fff'}}/>
        </div>
        <h1 style={{fontSize:26,fontWeight:700,marginBottom:6}}>Retro Board</h1>
        <p style={{fontSize:14,color:'#888',marginBottom:'2rem'}}>enlight360containers · Real-time collaborative</p>
        <div style={{background:'#fff',borderRadius:16,padding:'1.75rem',boxShadow:'0 4px 24px rgba(0,0,0,0.08)'}}>
          <label style={{fontSize:13,fontWeight:600,color:'#444',display:'block',marginBottom:8,textAlign:'left'}}>Enter your name to join</label>
          <input value={nameInput} onChange={e=>setNameInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&joinBoard()} placeholder="e.g. John, Sarah..." style={{marginBottom:14,fontSize:15,padding:'11px 14px'}} autoFocus/>
          <button onClick={joinBoard} disabled={!nameInput.trim()} style={{width:'100%',padding:'12px',fontSize:15,fontWeight:600,background:'#FC6D26',color:'#fff',border:'none',borderRadius:10,boxShadow:'0 4px 16px rgba(252,109,38,0.3)'}}>
            Join Board →
          </button>
        </div>
        <p style={{fontSize:12,color:'#bbb',marginTop:16}}>Share this link with your team to collaborate in real time</p>
      </div>
    </div>
  );

  if (loading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
      <Spinner/><p style={{fontSize:14,color:'#888'}}>Loading retro board…</p>
    </div>
  );

  const allActions = board ? COLUMNS.flatMap(col=>board.cards[col.id].filter(c=>c.isActionItem||col.id==='actions').map(c=>({...c,colId:col.id}))) : [];
  const totalCards = board ? Object.values(board.cards).flat().length : 0;

  return (
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      {notif && <Notif msg={notif.msg} type={notif.type} onDone={()=>setNotif(null)}/>}
      <div style={{background:'#fff',borderBottom:'1px solid rgba(0,0,0,0.08)',padding:'0 1.5rem',position:'sticky',top:0,zIndex:100,boxShadow:'0 1px 8px rgba(0,0,0,0.05)'}}>
        <div style={{maxWidth:1500,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',height:56}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:'#FC6D26',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <i className="ti ti-layout-kanban" style={{fontSize:19,color:'#fff'}}/>
            </div>
            <span style={{fontSize:15,fontWeight:600}}>{board?.name}</span>
            <Badge bg="#fff5f0" color="#b84800">{board?.sprintTag}</Badge>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontSize:12,color:'#aaa',display:'flex',alignItems:'center',gap:5}}>
              {syncing ? <><Spinner/> Syncing…</> : lastSync ? <>🟢 {lastSync.toLocaleTimeString()}</> : null}
            </span>
            <div style={{width:32,height:32,borderRadius:'50%',background:'#FC6D26',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700}}>{userName[0]?.toUpperCase()}</div>
            <span style={{fontSize:13,fontWeight:500}}>{userName}</span>
            <button onClick={resetBoard} style={{fontSize:12,padding:'5px 10px',color:'#e74c3c',border:'1px solid rgba(231,76,60,0.3)'}}>Reset</button>
            <button onClick={()=>{localStorage.removeItem('retro_username');setJoined(false);setUserName('');setBoard(null);setLoading(true);}} style={{fontSize:12,padding:'5px 10px',color:'#888'}}>Leave</button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:1500,margin:'0 auto',padding:'1.25rem 1.5rem'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:'1.25rem'}}>
          {[{l:'Total cards',v:totalCards,i:'ti-cards'},{l:'Action items',v:allActions.length,i:'ti-checkbox'},{l:'Columns',v:4,i:'ti-layout-columns'},{l:'Live sync',v:'ON',i:'ti-refresh'}].map(s=>(
            <div key={s.l} style={{background:'#fff',borderRadius:10,padding:'12px 16px',border:'1px solid rgba(0,0,0,0.07)',boxShadow:'0 1px 4px rgba(0,0,0,0.04)'}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}><i className={`ti ${s.i}`} style={{fontSize:15,color:'#FC6D26'}}/><span style={{fontSize:12,color:'#888'}}>{s.l}</span></div>
              <span style={{fontSize:22,fontWeight:700}}>{s.v}</span>
            </div>
          ))}
        </div>

        <div style={{display:'flex',gap:2,marginBottom:'1.25rem',borderBottom:'2px solid rgba(0,0,0,0.07)'}}>
          {[{id:'board',l:'Board',i:'ti-layout-kanban'},{id:'actions',l:'Action items',i:'ti-checkbox'},{id:'summary',l:'Summary',i:'ti-file-description'}].map(t=>(
            <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{fontSize:13,padding:'9px 18px',border:'none',borderBottom:activeTab===t.id?'2px solid #FC6D26':'2px solid transparent',borderRadius:0,background:'transparent',color:activeTab===t.id?'#FC6D26':'#666',cursor:'pointer',fontWeight:activeTab===t.id?600:400,display:'flex',alignItems:'center',gap:6,marginBottom:'-2px'}}>
              <i className={`ti ${t.i}`} style={{fontSize:14}}/>{t.l}
            </button>
          ))}
        </div>

        {activeTab==='board' && board && (
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
            {COLUMNS.map(col=>(
              <div key={col.id} style={{background:'#fff',borderRadius:12,border:'1px solid rgba(0,0,0,0.07)',overflow:'hidden',boxShadow:'0 1px 6px rgba(0,0,0,0.05)'}}>
                <div style={{padding:'11px 13px',borderBottom:`3px solid ${col.color}`,display:'flex',alignItems:'center',gap:7,background:col.bg}}>
                  <i className={`ti ${col.icon}`} style={{fontSize:15,color:col.color}}/>
                  <span style={{fontSize:13,fontWeight:600,flex:1,color:col.tc}}>{col.title}</span>
                  <span style={{fontSize:11,padding:'1px 8px',borderRadius:20,background:'rgba(255,255,255,0.7)',color:col.tc,fontWeight:600}}>{board.cards[col.id].length}</span>
                </div>
                <div style={{padding:10,display:'flex',flexDirection:'column',gap:7,minHeight:120}}>
                  {board.cards[col.id].map(card=>(
                    <CardItem key={card.id} card={card} col={col}
                      votes={board.votes} reactions={board.reactions} comments={board.comments}
                      commentInput={commentInput} expandedCard={expandedCard} userName={userName}
                      onVote={()=>toggleVote(card.id)} onReact={e=>addReaction(card.id,e)}
                      onDelete={()=>deleteCard(col.id,card.id)}
                      onExpand={()=>setExpandedCard(expandedCard===card.id?null:card.id)}
                      onCommentChange={v=>setCommentInput(p=>({...p,[card.id]:v}))}
                      onAddComment={()=>addComment(card.id)}
                      onUpdate={u=>updateCard(col.id,card.id,u)}
                      onMarkAction={()=>updateCard(col.id,card.id,{isActionItem:!card.isActionItem})}
                    />
                  ))}
                  <div style={{display:'flex',gap:5,marginTop:'auto',paddingTop:4}}>
                    <input value={newText[col.id]||''} onChange={e=>setNewText(p=>({...p,[col.id]:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&addCard(col.id)} placeholder="Add a card…" style={{flex:1,fontSize:12,padding:'6px 9px'}}/>
                    <button onClick={()=>addCard(col.id)} style={{padding:'6px 10px'}}><i className="ti ti-plus" style={{fontSize:13}}/></button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {activeTab==='actions' && board && (
          <div>
            {allActions.length===0 ? (
              <div style={{textAlign:'center',padding:'4rem',color:'#bbb'}}>
                <i className="ti ti-checkbox" style={{fontSize:44,display:'block',marginBottom:12}}/>
                <p style={{fontSize:14}}>No action items yet.</p>
              </div>
            ) : (
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {allActions.map(card=>(
                  <ActionRow key={card.id} card={card} col={COLUMNS.find(c=>c.id===card.colId)} onUpdate={u=>updateCard(card.colId,card.id,u)}/>
                ))}
              </div>
            )}
          </div>
        )}

        {activeTab==='summary' && board && (
          <div style={{maxWidth:700}}>
            <div style={{background:'#fff',borderRadius:12,padding:'1.25rem',border:'1px solid rgba(0,0,0,0.07)',marginBottom:12}}>
              <h2 style={{fontSize:17,fontWeight:700,marginBottom:4}}>{board.name}</h2>
              <p style={{fontSize:13,color:'#666',marginBottom:10}}>{board.desc}</p>
              <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                <Badge bg="#fff5f0" color="#b84800">{board.sprintTag}</Badge>
                <Badge bg="#f4f5f7" color="#555">{new Date().toLocaleDateString()}</Badge>
                <Badge bg="#e8f0fe" color="#0d3a78">{totalCards} cards</Badge>
                <Badge bg="#fff8e6" color="#6b3c00">{allActions.length} action items</Badge>
              </div>
            </div>
            {COLUMNS.map(col=>(
              <div key={col.id} style={{background:'#fff',borderRadius:12,padding:'1rem 1.25rem',border:'1px solid rgba(0,0,0,0.07)',marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                  <i className={`ti ${col.icon}`} style={{color:col.color,fontSize:15}}/>
                  <span style={{fontSize:14,fontWeight:600}}>{col.title}</span>
                  <span style={{fontSize:12,color:'#aaa'}}>({board.cards[col.id].length})</span>
                </div>
                {board.cards[col.id].length===0 ? <p style={{fontSize:13,color:'#bbb'}}>No items</p> : (
                  <ul style={{paddingLeft:18,display:'flex',flexDirection:'column',gap:6}}>
                    {board.cards[col.id].map(c=>(
                      <li key={c.id} style={{fontSize:13,lineHeight:1.6}}>{c.text} <span style={{fontSize:11,color:'#aaa'}}>— {c.author}</span>
                        {c.assignee && <span style={{fontSize:11,color:'#888',marginLeft:6}}>→ {c.assignee}</span>}
                        {c.dueDate && <span style={{fontSize:11,color:'#888',marginLeft:6}}>📅 {c.dueDate}</span>}
                      </li>
                    ))}
                  </ul>
                )}
              </div>
            ))}
            <button onClick={exportSummary} style={{width:'100%',padding:'12px',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:8,background:'#FC6D26',color:'#fff',border:'none',borderRadius:10}}>
              <i className="ti ti-download" style={{fontSize:16}}/>Download summary as Markdown
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function CardItem({ card, col, votes, reactions, comments, commentInput, expandedCard, userName, onVote, onReact, onDelete, onExpand, onCommentChange, onAddComment, onUpdate, onMarkAction }) {
  const isExp = expandedCard===card.id;
  const vc = votes[card.id]||0;
  const cr = reactions[card.id]||{};
  const cc = comments[card.id]||[];
  const EMOJIS = ['👍','❤️','💡','🎉','🤔'];
  return (
    <div style={{background:'#fff',borderRadius:8,border:'1px solid rgba(0,0,0,0.08)',overflow:'hidden',boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
      <div style={{padding:'9px 11px'}}>
        <p style={{fontSize:13,lineHeight:1.55,marginBottom:7}}>{card.text}</p>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:6}}>
          <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:11,color:'#aaa'}}>{card.author}</span>
            {card.isActionItem && <span style={{fontSize:10,padding:'1px 6px',borderRadius:20,background:'#fff8e6',color:'#6b3c00',fontWeight:500}}>action</span>}
            {card.status==='done' && <span style={{fontSize:10,padding:'1px 6px',borderRadius:20,background:'#e6f9f0',color:'#0a5a38',fontWeight:500}}>done</span>}
          </div>
          <div style={{display:'flex',gap:3}}>
            <button onClick={onVote} style={{fontSize:11,padding:'2px 8px',display:'flex',alignItems:'center',gap:3}}><i className="ti ti-arrow-up" style={{fontSize:11}}/>{vc}</button>
            <button onClick={onExpand} style={{fontSize:11,padding:'2px 8px'}}><i className={`ti ${isExp?'ti-chevron-up':'ti-chevron-down'}`} style={{fontSize:11}}/></button>
            {card.author===userName && <button onClick={onDelete} style={{fontSize:11,padding:'2px 8px',color:'#e74c3c'}}><i className="ti ti-trash" style={{fontSize:11}}/></button>}
          </div>
        </div>
        {Object.keys(cr).length>0 && (
          <div style={{display:'flex',gap:4,marginTop:6,flexWrap:'wrap'}}>
            {Object.entries(cr).map(([e,c])=><span key={e} style={{fontSize:12,padding:'1px 7px',borderRadius:20,background:'#f4f5f7',border:'1px solid rgba(0,0,0,0.08)'}}>{e} {c}</span>)}
          </div>
        )}
      </div>
      {isExp && (
        <div style={{borderTop:'1px solid rgba(0,0,0,0.07)',padding:'10px 11px',display:'flex',flexDirection:'column',gap:9,background:'#fafbfc'}}>
          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
            {EMOJIS.map(e=><button key={e} onClick={()=>onReact(e)} style={{fontSize:15,padding:'3px 7px',border:'1px solid rgba(0,0,0,0.08)',borderRadius:8,background:'#fff'}}>{e}</button>)}
          </div>
          <div style={{display:'flex',gap:6}}>
            <input value={card.assignee||''} onChange={e=>onUpdate({assignee:e.target.value})} placeholder="Assignee" style={{flex:1,fontSize:12,padding:'5px 8px'}}/>
            <input type="date" value={card.dueDate||''} onChange={e=>onUpdate({dueDate:e.target.value})} style={{flex:1,fontSize:12,padding:'5px 8px'}}/>
          </div>
          <div style={{display:'flex',gap:6}}>
            <button onClick={onMarkAction} style={{flex:1,fontSize:12,padding:'6px 0',display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
              <i className={`ti ${card.isActionItem?'ti-checkbox':'ti-square'}`} style={{fontSize:13}}/>{card.isActionItem?'Remove action':'Mark as action'}
            </button>
            <select value={card.status||'open'} onChange={e=>onUpdate({status:e.target.value})} style={{flex:1,fontSize:12,padding:'5px 8px'}}>
              <option value="open">Open</option>
              <option value="in_progress">In progress</option>
              <option value="done">Done</option>
            </select>
          </div>
          {cc.length>0 && (
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              {cc.map(c=><div key={c.id} style={{fontSize:12,padding:'6px 9px',background:'#fff',borderRadius:7,border:'1px solid rgba(0,0,0,0.07)'}}><span style={{color:'#aaa',marginRight:6,fontWeight:500}}>{c.author}:</span>{c.text}</div>)}
            </div>
          )}
          <div style={{display:'flex',gap:6}}>
            <input value={commentInput[card.id]||''} onChange={e=>onCommentChange(e.target.value)} onKeyDown={e=>e.key==='Enter'&&onAddComment()} placeholder="Add a comment…" style={{flex:1,fontSize:12,padding:'5px 8px'}}/>
            <button onClick={onAddComment} style={{fontSize:12,padding:'5px 12px'}}>Post</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ActionRow({ card, col, onUpdate }) {
  const SC = { open:{bg:'#e8f0fe',tc:'#0d3a78'}, in_progress:{bg:'#fff8e6',tc:'#6b3c00'}, done:{bg:'#e6f9f0',tc:'#0a5a38'} };
  const s = SC[card.status]||SC.open;
  return (
    <div style={{background:'#fff',border:'1px solid rgba(0,0,0,0.08)',borderRadius:10,padding:'11px 14px',display:'flex',alignItems:'flex-start',gap:11,boxShadow:'0 1px 4px rgba(0,0,0,0.04)'}}>
      <i className={`ti ${col?.icon||'ti-checkbox'}`} style={{fontSize:17,color:col?.color,marginTop:2,flexShrink:0}}/>
      <div style={{flex:1,minWidth:0}}>
        <p style={{fontSize:14,marginBottom:6,lineHeight:1.5}}>{card.text}</p>
        <div style={{display:'flex',gap:7,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{fontSize:11,padding:'2px 8px',borderRadius:20,background:s.bg,color:s.tc,fontWeight:500}}>{card.status?.replace('_',' ')}</span>
          {card.assignee && <span style={{fontSize:12,color:'#666'}}><i className="ti ti-user" style={{fontSize:12,marginRight:3}}/>{card.assignee}</span>}
          {card.dueDate && <span style={{fontSize:12,color:'#666'}}><i className="ti ti-calendar" style={{fontSize:12,marginRight:3}}/>{card.dueDate}</span>}
          <span style={{fontSize:11,color:'#aaa'}}>by {card.author}</span>
        </div>
      </div>
      <select value={card.status||'open'} onChange={e=>onUpdate({status:e.target.value})} style={{fontSize:12,padding:'5px 8px',width:'auto',flexShrink:0}}>
        <option value="open">Open</option>
        <option value="in_progress">In progress</option>
        <option value="done">Done</option>
      </select>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
